<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./src/output.css" rel="stylesheet">
    <title>Todo App</title>
</head>

<style>
    /* Custom scrollbar styles */
    #list::-webkit-scrollbar {
        width: 8px;
    }
    #list::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 4px;
    }
    #list::-webkit-scrollbar-thumb:hover {
        background: #555;
    }
</style>

<body>
    <!-- main div -->
    <div class="p-4 mx-auto shadow-xl/30 w-80 h-133 rounded-lg" style="margin-top: 50px;">
        <div class="font-bold py-1"> Todo App</div>
        
        <!-- input box div -->
        <div class="flex justify-between py-1.5 gap-2">
            <input type="text" class="block w-full p-2 text-base border border-gray-300 rounded-lg bg-gray-50 py-1 px-2"
                placeholder="What do you need to do ?" id="entry"> </input>

            <button class="bg-white text-gray-600 border border-gray-200 border-b-2 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-2 rounded text-[10px] font-bold cursor-pointer" onclick="done()">
                Done
            </button>
        </div>

        <!-- list div -->
        <div>
            <ul id="list" class="overflow-y-scroll h-81.25 border border-gray-300 rounded-lg p-2">
                <!-- List items will be added here -->
            </ul>
        </div>

        <div class="py-4">
            <hr class="text-gray-400 py-0.5">

            <!-- check all div -->
            <div class="py-1">
                <div class="flex justify-between h-7">
                    <div class="flex h-6">
                        <div class="bg-white text-gray-600 border hover:text-blue-600 border-gray-200 border-b-2 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer" onclick="checkAll()"
                            id="checkAllBtn">
                            Check all
                        </div>

                        <div class="bg-white text-gray-600 border border-gray-200 border-b-2 hover:text-blue-600 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer" hidden onclick="uncheckAll()"
                            id="uncheckAllBtn"> Uncheck all
                        </div>
                    </div>

                    <div class="text-gray-400 text-xs" id="itemCount">0 item remaining</div>
                </div>
            </div>

            <hr class="text-gray-400 mt-1 py-1">
            
            <!-- all active completed clear div -->
            <div class="py-1">
                <div class="flex justify-between">
                    <div class="flex">
                        <div class="bg-white text-gray-600 border hover:text-blue-600 border-gray-200 border-b-2 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer data-[active=true]:bg-blue-600 data-[active=true]:text-white data-[active=true]:border-blue-800" onclick="All()" id="allBtn" data-active="true">
                            All
                        </div>
                    </div>

                    <div class="flex">
                        <div class="bg-white text-gray-600 border border-gray-200 border-b-2 hover:text-blue-600 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer data-[active=true]:bg-blue-600 data-[active=true]:text-white data-[active=true]:border-blue-800" onclick="Active()" id="activeBtn" data-active="false">
                            Active
                        </div>
                    </div>

                    <div class="flex">
                        <div class="bg-white text-gray-600 border border-gray-200 border-b-2 hover:text-blue-600 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer data-[active=true]:bg-blue-600 data-[active=true]:text-white data-[active=true]:border-blue-800" onclick="Completed()" id="completedBtn" data-active="false">
                            Completed
                        </div>
                    </div>

                    <div>
                        <div class="bg-white text-gray-600 border hover:text-red-600 border-gray-200 border-b-2 border-b-gray-300 active:border-b-0 active:translate-y-0.5 px-2 py-1 rounded text-[10px] font-bold cursor-pointer "
                            onclick="clearCompleted()">Clear Completed</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const entryInputBox = document.getElementById('entry')
        entryInputBox.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                done();
            }
        });

        let count = 1;

        // Simple active filter function
        function setActive(clickedId) {
            ['allBtn', 'activeBtn', 'completedBtn'].forEach(id => {
                const btn = document.getElementById(id);
                btn.dataset.active = btn.id === clickedId ? 'true' : 'false';
            });
        }

        function done() {
            const currentCount = count;
            const entryInput = document.getElementById('entry')
            let entryValue = entryInput.value

            if (!entryValue.trim()) return;

            // Create an "li" node:
            const li = document.createElement("li")
            li.className = "flex justify-between";
            li.id = count

            const div = document.createElement("div");
            div.className = "flex gap-3 py-1 text-xs";

            const input = document.createElement("input");
            input.type = "checkbox";
            input.className = "cursor-pointer";
            input.name = "Fruits";
            input.id = "Fruits";

            const text = document.createElement("div");
            text.textContent = entryValue;
            div.appendChild(input);
            div.appendChild(text);

            const button = document.createElement("button");
            button.className = "rounded-md text-lightgray py-0.5 px-1 hover:bg-red-600 cursor-pointer";
            button.type = "button";
            button.onclick = function () { remove(currentCount) };

            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("width", "24");
            svg.setAttribute("height", "24");
            svg.setAttribute("viewBox", "0 0 24 24");
            svg.setAttribute("fill", "none");
            svg.setAttribute("xmlns", "http://www.w3.org/2000/svg");

            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", "M6.99486 7.00636C6.60433 7.39689 6.60433 8.03005 6.99486 8.42058L10.58 12.0057L6.99486 15.5909C6.60433 15.9814 6.60433 16.6146 6.99486 17.0051C7.38538 17.3956 8.01855 17.3956 8.40907 17.0051L11.9942 13.4199L15.5794 17.0051C15.9699 17.3956 16.6031 17.3956 16.9936 17.0051C17.3841 16.6146 17.3841 15.9814 16.9936 15.5909L13.4084 12.0057L16.9936 8.42059C17.3841 8.03007 17.3841 7.3969 16.9936 7.00638C16.603 6.61585 15.9699 6.61585 15.5794 7.00638L11.9942 10.5915L8.40907 7.00636C8.01855 6.61584 7.38538 6.61584 6.99486 7.00636Z");
            path.setAttribute("fill", "#0F0F0F");
            svg.appendChild(path);
            button.appendChild(svg);
            li.appendChild(div);
            li.appendChild(button);
            document.getElementById("list").appendChild(li);

            input.addEventListener('change', function () {
                if (this.checked) {
                    text.style.textDecoration = "line-through";
                    text.style.opacity = "0.6";
                } else {
                    text.style.textDecoration = "none";
                    text.style.opacity = "1";
                }
                updateItemCount();
                updateCheckAllButtonVisibility();
            });

            count++;
            entryInput.value = "";
            updateItemCount();
            updateCheckAllButtonVisibility();
        }

        function remove(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
            updateItemCount();
            updateCheckAllButtonVisibility();
        }

        function clearCompleted() {
            const list = document.getElementById('list');
            const items = list.getElementsByTagName('li');

            for (let i = items.length - 1; i >= 0; i--) {
                const checkbox = items[i].querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    items[i].remove();
                }
            }
            updateItemCount();
            updateCheckAllButtonVisibility();
        }

        function Active() {
            setActive('activeBtn');
            
            const list = document.getElementById('list');
            const items = list.getElementsByTagName('li');
            let visibleCount = 0;

            for (let i = 0; i < items.length; i++) {
                const checkbox = items[i].querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    items[i].style.display = 'none';
                } else {
                    items[i].style.display = 'flex';
                    visibleCount++;
                }
            }
            updateItemCount(visibleCount);
        }

        function Completed() {
            setActive('completedBtn');
            
            const list = document.getElementById('list');
            const items = list.getElementsByTagName('li');
            let visibleCount = 0;

            for (let i = 0; i < items.length; i++) {
                const checkbox = items[i].querySelector('input[type="checkbox"]');
                if (checkbox && checkbox.checked) {
                    items[i].style.display = 'flex';
                    visibleCount++;
                } else {
                    items[i].style.display = 'none';
                }
            }
            updateItemCount(visibleCount);
        }

        function All() {
            setActive('allBtn');
            
            const list = document.getElementById('list');
            const items = list.getElementsByTagName('li');
            for (let i = 0; i < items.length; i++) {
                items[i].style.display = 'flex';
            }
            updateItemCount();
        }

        function checkAll() {
            const checkboxes = document.querySelectorAll('#list input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = true;
                const text = checkbox.nextElementSibling;
                if (text) {
                    text.style.textDecoration = "line-through";
                    text.style.opacity = "0.6";
                }
            });

            document.getElementById('checkAllBtn').setAttribute("hidden", "true");
            document.getElementById('uncheckAllBtn').removeAttribute("hidden");
            updateItemCount();
        }

        function uncheckAll() {
            const checkboxes = document.querySelectorAll('#list input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = false;
                const text = checkbox.nextElementSibling;
                if (text) {
                    text.style.textDecoration = "none";
                    text.style.opacity = "1";
                }
            });

            document.getElementById('checkAllBtn').removeAttribute("hidden");
            document.getElementById('uncheckAllBtn').setAttribute("hidden", "true");
            updateItemCount();
        }

        function updateItemCount(visibleCount = null) {
            const list = document.getElementById('list');
            const items = list.getElementsByTagName('li');
            if (visibleCount !== null) {
                document.getElementById('itemCount').textContent = visibleCount + ' item' + (visibleCount !== 1 ? 's' : '') + ' remaining';
                return;
            }

            let remainingCount = 0;
            for (let i = 0; i < items.length; i++) {
                const checkbox = items[i].querySelector('input[type="checkbox"]');
                if (checkbox && !checkbox.checked) {
                    remainingCount++;
                }
            }

            document.getElementById('itemCount').textContent = remainingCount + ' item' + (remainingCount !== 1 ? 's' : '') + ' remaining';
        }

        function updateCheckAllButtonVisibility() {
            const checkboxes = document.querySelectorAll('#list input[type="checkbox"]');
            if (checkboxes.length === 0) {
                document.getElementById('checkAllBtn').removeAttribute("hidden");
                document.getElementById('uncheckAllBtn').setAttribute("hidden", "true");
            }
        }
    </script>
</body>

</html>
