<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Website design </title>
</head>
<body>

    <div class="p-4 mx-auto shadow-xl/30 w-80 h-70 rounded-lg " style="margin-top: 50px;">
        <div class="font-bold py-1"> Website design </div>
        <div class="flex justify-between py-1">
            <input type="text" class="block w-full p-2 text-base border border-gray-300 rounded-lg bg-gray-50"
                placeholder="What do you need to do ?"> </input>

                <button  class="rounded-md text-xs text-lightgray py-0.5 px-1 hover:bg-red-600" onclick="done()">
                    Done
                </button>

        </div>
        <div>
            <ul id="list">
                <li class="flex justify-between" id="fruit">
                    <div class="flex gap-3 py-2 text-xs" >
                        <input type="checkbox" name="Fruits" id="Fruits" aria-colspan="3">
                        <div> Apple </div> 
                    </div>
                    <button class="rounded-md text-lightgray py-0.5 px-1 hover:bg-red-600"> <svg
                            width="24" height="24" viewBox="0 0 24 24" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M6.99486 7.00636C6.60433 7.39689 6.60433 8.03005 6.99486 8.42058L10.58 12.0057L6.99486 15.5909C6.60433 15.9814 6.60433 16.6146 6.99486 17.0051C7.38538 17.3956 8.01855 17.3956 8.40907 17.0051L11.9942 13.4199L15.5794 17.0051C15.9699 17.3956 16.6031 17.3956 16.9936 17.0051C17.3841 16.6146 17.3841 15.9814 16.9936 15.5909L13.4084 12.0057L16.9936 8.42059C17.3841 8.03007 17.3841 7.3969 16.9936 7.00638C16.603 6.61585 15.9699 6.61585 15.5794 7.00638L11.9942 10.5915L8.40907 7.00636C8.01855 6.61584 7.38538 6.61584 6.99486 7.00636Z"
                                fill="#0F0F0F" />
                        </svg> </button>
                </li>
            </ul>
            <div    class="flex justify-between py-1">
                <input type="text" class="block w-full p-2 text-base border border-gray-300 rounded-lg bg-gray-50"
                    placeholder="What do you need to do ?"> </input>

                    <button  class="rounded-md text-xs text-lightgray py-0.5 px-1 hover:bg-red-600" onclick="done()">
                        Done
                    </button>
    </div>
    
</body>
</html>
