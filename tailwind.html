<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Tailwind via CDN for simplicity (equivalent to your output.css) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- add a touch of custom font & smoothness -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        /* subtle animation for new row */
        .fruit-row {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* make table scrollable on small screens with a clean look */
        .table-wrapper {
            max-height: 70vh;
            overflow-y: auto;
            border-radius: 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: #f472b6 #fbcfe8;
        }
        .table-wrapper::-webkit-scrollbar {
            width: 8px;
        }
        .table-wrapper::-webkit-scrollbar-track {
            background: #fbcfe8;  /* pink-100 */
            border-radius: 20px;
        }
        .table-wrapper::-webkit-scrollbar-thumb {
            background: #f472b6; /* pink-400 */
            border-radius: 20px;
        }
    </style>
    <title>Fruity dashboard 🍍</title>
</head>
<body class="bg-gradient-to-br from-pink-200 via-red-100 to-rose-200 min-h-screen flex items-start justify-center p-6">

    <!-- main card with frosted glass effect -->
    <div class="w-full max-w-2xl bg-white/60 backdrop-blur-sm rounded-3xl shadow-2xl border border-white/40 p-6 md:p-8">

        <!-- header with cute icon & title -->
        <div class="flex items-center gap-2 mb-6">
            <div class="p-3 bg-gradient-to-tr from-pink-400 to-orange-300 rounded-2xl shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white drop-shadow" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-rose-800 drop-shadow-sm">Fruit ledger 🍒</h1>
            <span class="ml-auto bg-pink-100 text-pink-800 text-sm font-semibold px-4 py-1.5 rounded-full shadow-inner">count: <span id="fruitCount">26</span></span>
        </div>

        <!-- add bar: input + button (fixed flex, no more absolute chaos) -->
        <div class="flex flex-col sm:flex-row gap-3 mb-8">
            <input type="text" id="fruitInput" placeholder="e.g., mangosteen" 
                   class="w-full sm:flex-1 border-2 border-pink-200 rounded-xl px-5 py-3 text-base bg-white/70 backdrop-blur-sm focus:border-pink-400 focus:ring-2 focus:ring-pink-300 outline-none transition shadow-sm">
            <button id="addFruitBtn" 
                    class="rounded-full bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white font-medium py-3 px-8 shadow-lg hover:shadow-xl transition-all duration-200 flex items-center justify-center gap-1">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                <span>Add fruit</span>
            </button>
        </div>

        <!-- scrollable table wrapper – keeps all fruits visible without breaking layout -->
        <div class="table-wrapper rounded-2xl bg-white/30 backdrop-blur-sm p-1 border border-white/40 shadow-inner">
            <table class="w-full text-lg" id="fruitTable">
                <thead class="sticky top-0 bg-rose-100/80 backdrop-blur-sm z-10">
                    <tr>
                        <th class="text-left py-4 px-5 text-rose-800 text-xl font-semibold tracking-wide">🍇 Fruits list</th>
                    </tr>
                </thead>
                <tbody id="fruitTableBody" class="divide-y divide-rose-200/60">
                    <!-- fruits will be dynamically populated from javascript -->
                </tbody>
            </table>
        </div>
        
        <!-- subtle footer hint -->
        <p class="text-xs text-rose-400 mt-4 text-center">✨ click on delete to remove — every fruit has its own color ✨</p>
    </div>

    <script>
        (function() {
            // ----- original fruit dataset (all those lovely fruits from your html, with unique colors) -----
            const fruitData = [
                { name: 'Apple', bg: 'bg-red-500', hover: 'hover:bg-red-600' },
                { name: 'Orange', bg: 'bg-orange-500', hover: 'hover:bg-orange-600' },
                { name: 'Banana', bg: 'bg-yellow-500', hover: 'hover:bg-yellow-600' },
                { name: 'Grapes', bg: 'bg-purple-500', hover: 'hover:bg-purple-600' },
                { name: 'Mango', bg: 'bg-orange-500', hover: 'hover:bg-orange-600' },
                { name: 'Pineapple', bg: 'bg-pink-500', hover: 'hover:bg-pink-600' },
                { name: 'Watermelon', bg: 'bg-cyan-500', hover: 'hover:bg-cyan-600' },
                { name: 'Papaya', bg: 'bg-lime-500', hover: 'hover:bg-lime-600' },
                { name: 'Kiwi', bg: 'bg-emerald-500', hover: 'hover:bg-emerald-600' },
                { name: 'Strawberry', bg: 'bg-rose-500', hover: 'hover:bg-rose-600' },
                { name: 'Blueberry', bg: 'bg-blue-500', hover: 'hover:bg-blue-600' },
                { name: 'Raspberry', bg: 'bg-fuchsia-500', hover: 'hover:bg-fuchsia-600' },
                { name: 'Blackberry', bg: 'bg-violet-500', hover: 'hover:bg-violet-600' },
                { name: 'Grapefruit', bg: 'bg-indigo-500', hover: 'hover:bg-indigo-600' },
                { name: 'Lemon', bg: 'bg-yellow-500', hover: 'hover:bg-yellow-600' },
                { name: 'Lime', bg: 'bg-green-500', hover: 'hover:bg-green-600' },
                { name: 'Coconut', bg: 'bg-stone-500', hover: 'hover:bg-stone-600' }, // using stone instead of gray-500
                { name: 'Avocado', bg: 'bg-green-500', hover: 'hover:bg-green-600' },
                { name: 'Peach', bg: 'bg-pink-500', hover: 'hover:bg-pink-600' },
                { name: 'Pear', bg: 'bg-green-500', hover: 'hover:bg-green-600' },
                { name: 'Plum', bg: 'bg-purple-500', hover: 'hover:bg-purple-600' },
                { name: 'Pomegranate', bg: 'bg-red-500', hover: 'hover:bg-red-600' },
                { name: 'Fig', bg: 'bg-yellow-500', hover: 'hover:bg-yellow-600' },
                { name: 'Date', bg: 'bg-amber-800', hover: 'hover:bg-amber-900' },  // brown approximated
                { name: 'Dragonfruit', bg: 'bg-pink-500', hover: 'hover:bg-pink-600' },
                { name: 'Lychee', bg: 'bg-red-500', hover: 'hover:bg-red-600' },
                { name: 'Passionfruit', bg: 'bg-purple-500', hover: 'hover:bg-purple-600' },
                { name: 'Starfruit', bg: 'bg-yellow-500', hover: 'hover:bg-yellow-600' },
                { name: 'Durian', bg: 'bg-green-500', hover: 'hover:bg-green-600' },
                { name: 'Jackfruit', bg: 'bg-yellow-500', hover: 'hover:bg-yellow-600' },
                { name: 'Rambutan', bg: 'bg-red-500', hover: 'hover:bg-red-600' },
                { name: 'Tamarind', bg: 'bg-amber-800', hover: 'hover:bg-amber-900' } // brown
            ];

            // reference to tbody and count span
            const tbody = document.getElementById('fruitTableBody');
            const countSpan = document.getElementById('fruitCount');
            const inputEl = document.getElementById('fruitInput');
            const addBtn = document.getElementById('addFruitBtn');

            // helper: update fruit count
            function updateCount() {
                const rows = tbody.querySelectorAll('tr').length;
                countSpan.textContent = rows;
            }

            // helper: create a new row given fruit name and color classes (bg & hover)
            function createRow(fruitName, bgClass, hoverClass) {
                const tr = document.createElement('tr');
                tr.className = 'fruit-row transition-colors hover:bg-pink-50/30';
                
                // td with fruit name and delete button
                const td = document.createElement('td');
                td.className = 'py-3 px-5 flex items-center justify-between rounded-2xl';
                
                // left side: fruit name with tiny icon
                const nameSpan = document.createElement('span');
                nameSpan.className = 'font-medium text-gray-800 capitalize flex items-center gap-2';
                nameSpan.innerHTML = `<span class="text-xl">🍄</span> ${fruitName}`;  // just for fun
                
                // delete button with dynamic colors
                const delBtn = document.createElement('button');
                delBtn.className = `rounded-full ${bgClass} ${hoverClass} text-white text-sm py-2 px-5 shadow-md hover:shadow-lg transition-all duration-150 font-medium tracking-wide border border-white/30`;
                delBtn.textContent = 'delete';
                
                // attach delete event
                delBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tr.remove();
                    updateCount();
                });
                
                td.appendChild(nameSpan);
                td.appendChild(delBtn);
                tr.appendChild(td);
                return tr;
            }

            // function to populate initial fruits from fruitData
            function renderInitialFruits() {
                // clear any placeholder
                tbody.innerHTML = '';
                fruitData.forEach(f => {
                    const row = createRow(f.name, f.bg, f.hover);
                    tbody.appendChild(row);
                });
                updateCount();
            }

            // function to add a new fruit dynamically (pick a random color from existing palette? but we can assign one of preset)
            // better: we rotate through some nice colors to keep variety
            const colorPalette = [
                { bg: 'bg-red-400', hover: 'hover:bg-red-500' },
                { bg: 'bg-orange-400', hover: 'hover:bg-orange-500' },
                { bg: 'bg-amber-400', hover: 'hover:bg-amber-500' },
                { bg: 'bg-yellow-400', hover: 'hover:bg-yellow-500' },
                { bg: 'bg-lime-400', hover: 'hover:bg-lime-500' },
                { bg: 'bg-green-400', hover: 'hover:bg-green-500' },
                { bg: 'bg-emerald-400', hover: 'hover:bg-emerald-500' },
                { bg: 'bg-teal-400', hover: 'hover:bg-teal-500' },
                { bg: 'bg-cyan-400', hover: 'hover:bg-cyan-500' },
                { bg: 'bg-sky-400', hover: 'hover:bg-sky-500' },
                { bg: 'bg-blue-400', hover: 'hover:bg-blue-500' },
                { bg: 'bg-indigo-400', hover: 'hover:bg-indigo-500' },
                { bg: 'bg-violet-400', hover: 'hover:bg-violet-500' },
                { bg: 'bg-purple-400', hover: 'hover:bg-purple-500' },
                { bg: 'bg-fuchsia-400', hover: 'hover:bg-fuchsia-500' },
                { bg: 'bg-pink-400', hover: 'hover:bg-pink-500' },
                { bg: 'bg-rose-400', hover: 'hover:bg-rose-500' }
            ];
            let colorIndex = 0;

            function getNextColor() {
                const col = colorPalette[colorIndex % colorPalette.length];
                colorIndex++;
                return col;
            }

            // Add fruit button logic
            function addFruitFromInput() {
                let fruitName = inputEl.value.trim();
                if (fruitName === '') {
                    // empty? show a playful alert but better: gentle UI feedback
                    inputEl.classList.add('border-red-400', 'placeholder-red-200');
                    inputEl.value = '';
                    inputEl.placeholder = 'enter a fruit name!';
                    setTimeout(() => {
                        inputEl.classList.remove('border-red-400', 'placeholder-red-200');
                        inputEl.placeholder = 'e.g., mangosteen';
                    }, 1000);
                    return;
                }
                // capitalize first letter (optional)
                fruitName = fruitName.charAt(0).toUpperCase() + fruitName.slice(1).toLowerCase();
                
                // pick a color
                const { bg, hover } = getNextColor();
                const newRow = createRow(fruitName, bg, hover);
                tbody.appendChild(newRow);
                
                // scroll to new row (smooth)
                newRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                
                // clear input
                inputEl.value = '';
                updateCount();
            }

            addBtn.addEventListener('click', addFruitFromInput);
            
            // allow pressing Enter in input
            inputEl.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    addFruitFromInput();
                }
            });

            // initial rendering of all your fruits (with original colors)
            renderInitialFruits();

            // optional: fix colorIndex to start after existing fruits if we add more, but it's fine.
            // set colorIndex to some offset to not repeat too early
            colorIndex = fruitData.length + 3; // just to mix

            // bonus: any leftover fruit rows from static HTML? we removed them and recreated dynamically, so it's consistent.
            // but the original had no script, now we have a fully interactive list with count.
            // also ensures "delete" removes row and updates counter
        })();
    </script>
</body>
</html>
