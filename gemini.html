<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Todo App</title>
    <style>
        /* This ensures the scrollbar colors work across all browsers */
        #list {
            scrollbar-width: thin;
            scrollbar-color: #3b82f6 #f1f5f9;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="p-6 bg-white shadow-2xl w-80 rounded-2xl">
        <div class="font-bold text-xl py-2 text-gray-800">Todo App</div>
        
        <div class="flex gap-2 py-2">
            <input type="text" 
                   class="block w-full p-2 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                   placeholder="What do you need to do?" 
                   id="entry">

            <button class="bg-blue-500 text-white rounded-lg text-xs font-semibold px-3 py-1 hover:bg-blue-600 transition-colors" 
                    onclick="done()">
                Add
            </button>
        </div>

        <div class="mt-4">
            <ul id="list" class="overflow-y-auto h-64 border border-gray-200 rounded-xl p-2 space-y-2
                        [scrollbar-gutter:stable]
                        [&::-webkit-scrollbar]:w-2
                        [&::-webkit-scrollbar-track]:bg-slate-100
                        [&::-webkit-scrollbar-track]:rounded-full
                        [&::-webkit-scrollbar-thumb]:bg-blue-400
                        [&::-webkit-scrollbar-thumb]:rounded-full
                        hover:[&::-webkit-scrollbar-thumb]:bg-blue-500">
                </ul>
        </div>

        <div class="mt-4">
            <hr class="border-gray-100">

            <div class="py-3">
                <div class="flex justify-between items-center">
                    <div class="flex">
                        <button class="text-blue-500 hover:text-blue-700 text-xs font-medium" 
                                onclick="checkAll()" id="checkAllBtn">
                            Check all
                        </button>
                        <button class="text-red-500 hover:text-red-700 text-xs font-medium" 
                                hidden onclick="uncheckAll()" id="uncheckAllBtn">
                            Uncheck all
                        </button>
                    </div>
                    <div class="text-gray-400 text-[10px] uppercase tracking-wider font-bold" id="itemCount">0 items left</div>
                </div>
            </div>

            <hr class="border-gray-100">

            <div class="pt-3">
                <div class="flex justify-between gap-1">
                    <button class="text-gray-500 hover:bg-gray-100 px-2 py-1 rounded text-[10px] font-bold uppercase transition-colors" onclick="All()">All</button>
                    <button class="text-gray-500 hover:bg-gray-100 px-2 py-1 rounded text-[10px] font-bold uppercase transition-colors" onclick="Active()">Active</button>
                    <button class="text-gray-500 hover:bg-gray-100 px-2 py-1 rounded text-[10px] font-bold uppercase transition-colors" onclick="Completed()">Done</button>
                    <button class="text-red-400 hover:bg-red-50 px-2 py-1 rounded text-[10px] font-bold uppercase transition-colors" onclick="clearCompleted()">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const entryInputBox = document.getElementById('entry');
        const listContainer = document.getElementById('list');

        entryInputBox.addEventListener('keypress', (e) => { if (e.key === 'Enter') done(); });

        let count = 1;

        function done() {
            const val = entryInputBox.value.trim();
            if (!val) return;

            const li = document.createElement("li");
            const currentId = `item-${count}`;
            li.id = currentId;
            li.className = "flex justify-between items-center bg-white p-2 border border-gray-50 rounded-lg shadow-sm hover:shadow-md transition-shadow";

            li.innerHTML = `
                <div class="flex items-center gap-3 text-sm text-gray-700">
                    <input type="checkbox" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer">
                    <span class="todo-text transition-all">${val}</span>
                </div>
                <button class="text-gray-300 hover:text-red-500 transition-colors" onclick="remove('${currentId}')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
                </button>
            `;

            listContainer.appendChild(li);
            
            // Handle Checkbox Change
            const checkbox = li.querySelector('input');
            const textSpan = li.querySelector('.todo-text');
            checkbox.addEventListener('change', () => {
                textSpan.classList.toggle('line-through', checkbox.checked);
                textSpan.classList.toggle('opacity-50', checkbox.checked);
                updateItemCount();
            });

            // Auto-scroll to bottom
            listContainer.scrollTo({ top: listContainer.scrollHeight, behavior: 'smooth' });

            count++;
            entryInputBox.value = "";
            updateItemCount();
        }

        function remove(id) {
            document.getElementById(id)?.remove();
            updateItemCount();
        }

        function clearCompleted() {
            const items = listContainer.querySelectorAll('li');
            items.forEach(item => {
                if (item.querySelector('input').checked) item.remove();
            });
            updateItemCount();
        }

        function Active() { filterItems(false); }
        function Completed() { filterItems(true); }
        function All() {
            listContainer.querySelectorAll('li').forEach(li => li.style.display = 'flex');
            updateItemCount();
        }

        function filterItems(isCompleted) {
            const items = listContainer.querySelectorAll('li');
            items.forEach(li => {
                const checked = li.querySelector('input').checked;
                li.style.display = checked === isCompleted ? 'flex' : 'none';
            });
        }

        function checkAll() {
            toggleAll(true);
            document.getElementById('checkAllBtn').hidden = true;
            document.getElementById('uncheckAllBtn').hidden = false;
        }

        function uncheckAll() {
            toggleAll(false);
            document.getElementById('checkAllBtn').hidden = false;
            document.getElementById('uncheckAllBtn').hidden = true;
        }

        function toggleAll(status) {
            listContainer.querySelectorAll('li').forEach(li => {
                const cb = li.querySelector('input');
                const txt = li.querySelector('.todo-text');
                cb.checked = status;
                txt.classList.toggle('line-through', status);
                txt.classList.toggle('opacity-50', status);
            });
            updateItemCount();
        }

        function updateItemCount() {
            const remaining = Array.from(listContainer.querySelectorAll('input')).filter(i => !i.checked).length;
            document.getElementById('itemCount').textContent = `${remaining} item${remaining !== 1 ? 's' : ''} left`;
        }
    </script>
</body>
</html>
